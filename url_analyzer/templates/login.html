<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — URL Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-blue-600 mb-4">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold">URL Analyzer</h1>
            <p class="text-gray-400 text-sm mt-1">Security Dashboard</p>
        </div>

        <div class="bg-gray-900 rounded-xl border border-gray-700 p-6 shadow-xl">
            {% if error %}
            <div class="mb-4 bg-red-900/40 border border-red-700 text-red-300 text-sm rounded-lg px-4 py-3">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/dashboard/login" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Username</label>
                    <input type="text" name="username" required autofocus
                           class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2.5 text-sm
                                  focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                    <input type="password" name="password" required
                           class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2.5 text-sm
                                  focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2.5 rounded-lg
                               transition-colors text-sm mt-2">
                    Sign in
                </button>
            </form>
        </div>
    </div>
</body>
</html>
